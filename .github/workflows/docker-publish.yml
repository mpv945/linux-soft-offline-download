# 不生成镜像，直接构建后就输出文件， 最后.或者指定目录，表示Dockerfile 可以访问的目录
      - name: Build
        run: |
          export PROJECT_DIR=$GITHUB_WORKSPACE
          docker buildx build \
            -f $PROJECT_DIR/docker_files/yum/old/Dockerfile \
            --output type=local,dest=./offline \
            $PROJECT_DIR/docker_files/yum/old

      - name: Package
        run: |
          ll -lah 
          tar czf docker-offline.tar.gz offline

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-offline
          path: docker-offline.tar.gz
          


